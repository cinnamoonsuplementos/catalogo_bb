<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor Catálogo CINNAMOON</title>
<style>
:root{--dark:#38103F;--gold:#B87228;--gold2:#E09850;--purple:#7C3CA0;--laven:#9C70B4;--bg:#F2EAFA;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f5f0fa;color:#2a0a30;min-height:100vh;}

/* TOOLBAR */
.toolbar{position:sticky;top:0;z-index:100;background:var(--dark);padding:10px 20px;
  display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.toolbar img{height:36px;border-radius:50%;}
.toolbar h1{color:var(--gold2);font-size:16px;letter-spacing:2px;flex:1;}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;}
.btn-gen{background:var(--gold2);color:var(--dark);}
.btn-gen:hover{background:#c8820a;}
.btn-exp{background:rgba(255,255,255,.12);color:var(--gold2);border:1px solid rgba(224,152,80,.4);}
.btn-exp:hover{background:rgba(255,255,255,.2);}
.btn-imp{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15);}
.btn-imp:hover{background:rgba(255,255,255,.15);}
#fileInput{display:none;}
.status{font-size:12px;color:var(--gold2);padding:0 8px;}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:24px 16px;}

/* CONTACT CARD */
.contact-card{background:white;border-radius:12px;margin-bottom:20px;overflow:hidden;
  box-shadow:0 2px 8px rgba(56,16,63,.08);}
.contact-card-header{background:var(--purple);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.contact-card-header span{color:white;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.contact-card-header small{color:rgba(255,255,255,.5);font-size:11px;margin-left:auto;}
.contact-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}
.contact-field{padding:14px 16px;border-right:1px solid #f0eaf5;}
.contact-field:last-child{border-right:none;}
.contact-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--laven);margin-bottom:6px;}
.contact-input{width:100%;padding:7px 10px;border:1.5px solid #e0d0f0;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--dark);font-family:'Segoe UI',sans-serif;background:#faf7fd;}
.contact-input:focus{outline:none;border-color:var(--purple);background:white;}

/* CATEGORY CARD */
.cat-card{background:white;border-radius:12px;margin-bottom:20px;overflow:hidden;
  box-shadow:0 2px 8px rgba(56,16,63,.08);}
.cat-card-header{background:var(--dark);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.cat-card-header span{color:var(--gold2);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.cat-count{color:rgba(255,255,255,.45);font-size:11px;margin-left:auto;}
.cat-active-count{font-size:11px;margin-left:6px;padding:2px 8px;border-radius:10px;
  background:rgba(224,152,80,.2);color:var(--gold2);}

/* PRODUCT ROW */
.prod-row{display:grid;grid-template-columns:32px 52px 1fr auto;align-items:center;gap:12px;
  padding:10px 16px;border-bottom:1px solid #f0eaf5;transition:opacity .2s,background .15s;}
.prod-row:last-child{border-bottom:none;}
.prod-row:hover{background:#faf7fd;}
.prod-row.inactive{opacity:.35;}
.prod-row.inactive .price-input{pointer-events:none;}

/* CHECKBOX */
.prod-check{width:20px;height:20px;accent-color:var(--purple);cursor:pointer;flex-shrink:0;}

.prod-thumb{width:52px;height:52px;object-fit:contain;border-radius:6px;background:#f5f0fa;}
.prod-info{}
.prod-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.prod-name-txt{font-size:13px;font-weight:700;color:var(--dark);}
.prod-det-txt{font-size:11px;color:#999;margin-top:1px;}
.price-wrap{display:flex;align-items:center;gap:4px;}
.price-prefix{font-size:15px;font-weight:700;color:var(--gold2);}
.price-input{width:90px;padding:6px 8px;border:1.5px solid #e0d0f0;border-radius:8px;
  font-size:15px;font-weight:700;color:var(--dark);text-align:right;
  font-family:'Segoe UI',sans-serif;background:#faf7fd;}
.price-input:focus{outline:none;border-color:var(--gold2);background:white;}
</style>
</head>

function fmtPrice(n){ return n.toLocaleString('en-US'); }
function parsePrice(s){ return parseInt(String(s).replace(/[^0-9]/g,''))||0; }
function setStatus(msg){

function isActive(ref){

  return cb ? cb.checked : true;
}

// ===================== RENDER EDITOR =====================
function toggleProduct(ref){
  const row = document.getElementById('row_'+ref);
  const cb  = document.getElementById('active_'+ref);
  if(row) row.classList.toggle('inactive', !cb.checked);
  updateCatCount(PRODUCTS[ref].cat);
}

function updateCatCount(cat){
  // Actualiza el contador "X/Y activos" en el header de la categoría
  const allInCat = Object.entries(PRODUCTS).filter(([,p]) => p.cat === cat).map(([r]) => r);
  const activeCount = allInCat.filter(r => isActive(r)).length;
  const el = document.getElementById('count_'+cat.replace(/\s/g,'_'));
  if(el) el.textContent = `${activeCount}/${allInCat.length} activos`;
}

function renderEditor(activos){
  const catOrder = ['PROTEÍNAS','CREATINA','PRE-ENTRENO','AMINOÁCIDOS','CONTROL DE PESO','SALUD Y VITAMINAS','SNACKS','SHAKERS','ACCESORIOS'];
  const groups = {};
  catOrder.forEach(c => groups[c] = []);
  Object.entries(PRODUCTS).forEach(([ref, p]) => {
    if(groups[p.cat]) groups[p.cat].push(ref);
  });

  let html = '';
  catOrder.forEach(cat => {
    const refs = groups[cat];
    if(!refs.length) return;
    const countId = 'count_' + cat.replace(/\s/g,'_');
    html += `<div class="cat-card">
      <div class="cat-card-header">
        <span>${cat}</span>
        <span id="${countId}" class="cat-active-count"></span>
        <span class="cat-count">${refs.length} productos</span>
      </div>`;
    refs.forEach(ref => {
      const p = PRODUCTS[ref];
      const checked = (activos && activos[ref] === false) ? '' : 'checked';
      const inactive = checked ? '' : ' inactive';
      const label = p.brand || '';
      html += `<div class="prod-row${inactive}" id="row_${ref}">
        <input class="prod-check" type="checkbox" id="active_${ref}" ${checked}
          onchange="toggleProduct('${ref}')">
        <img class="prod-thumb" src="imagenes_proc/${ref}.png" alt="${p.name}"
          onerror="this.style.display='none'">
        <div class="prod-info">
          ${label ? `<div class="prod-label">${label}</div>` : ''}
          <div class="prod-name-txt">${p.name}</div>
          ${p.det ? `<div class="prod-det-txt">${p.det}</div>` : ''}
        </div>
        <div class="price-wrap">
          <span class="price-prefix">$</span>
          <input class="price-input" type="text" id="price_${ref}"
            value="${fmtPrice(p.price)}"
            onblur="formatInput(this)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('editor').innerHTML = html;
  // Actualizar contadores
  catOrder.forEach(cat => updateCatCount(cat));
}

function formatInput(el){
  const n = parsePrice(el.value);
  if(n > 0) el.value = fmtPrice(n);
}

// ===================== JSON EXPORT / IMPORT =====================
function getFullState(){
  const precios = {}, activos = {};
  Object.keys(PRODUCTS).forEach(ref => {
    const priceEl = document.getElementById('price_'+ref);
    if(priceEl) precios[ref] = parsePrice(priceEl.value);
    const activeEl = document.getElementById('active_'+ref);
    if(activeEl && !activeEl.checked) activos[ref] = false;
    // Solo guardamos los que están desactivados (los activos se omiten = true por defecto)
  });
  return {
    fecha:    new Date().toISOString().slice(0,10),
    contacto: getContact(),
    precios,
    activos,
  };
}

function exportState(){
  const state = getFullState();
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `catalogo_cinnamoon_${state.fecha}.json`;
  a.click();
  setStatus('✓ JSON exportado');
}

function importState(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);

      // Precios
      const precios = data.precios || data;
      let updatedP = 0;
      Object.entries(precios).forEach(([ref, price]) => {
        const el = document.getElementById('price_'+ref);
        if(el){ el.value = fmtPrice(price); updatedP++; }
      });

      // Activos / inactivos
      const activos = data.activos || {};
      Object.keys(PRODUCTS).forEach(ref => {
        const cb  = document.getElementById('active_'+ref);
        const row = document.getElementById('row_'+ref);
        if(!cb) return;
        const isOn = activos[ref] !== false; // si no está en activos, es true
        cb.checked = isOn;
        row.classList.toggle('inactive', !isOn);
      });
      Object.keys(PRODUCTS).forEach(ref => updateCatCount(PRODUCTS[ref].cat));

      // Contacto
      if(data.contacto){
        const f = ['instagram','whatsapp','ciudad'];
        f.forEach(k => {
          const el = document.getElementById('c_'+k);
          if(el && data.contacto[k]) el.value = data.contacto[k];
        });
      }

      setStatus(`✓ ${updatedP} precios · contacto · visibilidad cargados`);
    } catch(err) {
      setStatus('✗ Error al leer JSON');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function buildProductHTML(ref, prices, sz){
  const p = PRODUCTS[ref];
  if(!p) return '';
  const rawPrice = prices[ref] !== undefined ? prices[ref] : p.price;
  const priceStr = '$' + fmtPrice(rawPrice);
  const imgExtra = p.imgExtra ? ` style="${p.imgExtra}"` : '';
  const imgTag = `<img src="imagenes_proc/${ref}.png" alt="${p.name}" loading="eager"${imgExtra}>`;
  if(p.simple){
    return `<div class="product">
  <div class="prod-img">${imgTag}</div>
  <div class="prod-line"></div>
  <div class="prod-name" style="font-size:${sz.n}">${p.name}</div>
  <div class="prod-price" style="font-size:${sz.p}">${priceStr}</div>
</div>`;
  }
  const detLine = p.det ? `<div class="prod-det" style="font-size:${sz.d}">${p.det}</div>` : '';
  return `<div class="product">
  <div class="prod-img">${imgTag}</div>
  <div class="prod-line"></div><div class="prod-brand" style="font-size:${sz.b}">${p.brand||''}</div>
  <div class="prod-name" style="font-size:${sz.n}">${p.name}</div>
  ${detLine}
  <div class="prod-price" style="font-size:${sz.p}">${priceStr}</div>
</div>`;
}

function buildCatalogHTML(state){
  const base    = window.location.href.replace(/\/[^/]*$/, '/');
  const logoSrc = 'logo.png';
  const prices  = state.precios  || {};
  const activos = state.activos  || {};
  const c       = state.contacto || DEFAULT_CONTACT;

  // Filtra los refs desactivados de cada página
  function activeRefs(refs){
    return refs.filter(r => activos[r] !== false);
  }

  function contactFoot(){
    return `<div class="cover-foot">
  <div class="c-row"><span class="c-lbl">INSTAGRAM</span><span class="c-val">${c.instagram}</span></div>
  <div class="c-row"><span class="c-lbl">WHATSAPP</span><span class="c-val">${c.whatsapp}</span></div>
  <div class="c-row"><span class="c-lbl">UBICACIÓN</span><span class="c-val">${c.ciudad}</span></div>
</div>`;
  }

  const coverPage = `<div class="page">
  <div class="cover-body">
    <div class="cover-wm">2026</div>
    <img class="cover-logo" src="${logoSrc}" alt="CINNAMOON">
    <div class="cover-brand">CINNAMOON</div>
    <div class="cover-rule"></div>
    <div class="cover-slogan">Rendí más, viví mejor</div>
    <div class="cover-tagline">TODO PARA TU BIENESTAR</div>
    <div class="cover-stats">
      <div class="cover-stat"><span class="cover-stat-num">80+</span><span class="cover-stat-lbl">Productos</span></div>
      <div class="cover-stat-sep"></div>
      <div class="cover-stat"><span class="cover-stat-num">9</span><span class="cover-stat-lbl">Categorías</span></div>
      <div class="cover-stat-sep"></div>
      <div class="cover-stat"><span class="cover-stat-num">10+</span><span class="cover-stat-lbl">Marcas</span></div>
    </div>
    <div class="cover-pills"><span class="pill">PROTEÍNAS</span><span class="pill">CREATINA</span><span class="pill">PRE-ENTRENO</span><span class="pill">VITAMINAS</span><span class="pill">SNACKS</span><span class="pill">SHAKERS</span><span class="pill">ACCESORIOS</span></div>
  </div>
  ${contactFoot()}
</div>`;

  const backPage = `<div class="page">
  <div class="back-body">
    <div class="back-wm">CINNAMOON</div>
    <img class="back-logo" src="${logoSrc}" alt="CINNAMOON">
    <div class="back-slogan">Rendí más, viví mejor</div>
    <div class="back-rule"></div>
    <div class="back-label">Encontranos en</div>
    <div class="c-cards">
      <div class="c-card"><span class="c-lbl">INSTAGRAM</span><span class="c-val">${c.instagram}</span></div>
      <div class="c-card"><span class="c-lbl">WHATSAPP</span><span class="c-val">${c.whatsapp}</span></div>
      <div class="c-card"><span class="c-lbl">UBICACIÓN</span><span class="c-val">${c.ciudad}</span></div>
    </div>
  </div>
  <div class="back-foot"><p>CINNAMOON SUPLEMENTOS &nbsp;·&nbsp; ${c.ciudad.toUpperCase()} &nbsp;·&nbsp; 2026</p></div>
</div>`;

  let pages = '';
  for(const page of PAGES){
    if(page.type === 'cover'){ pages += coverPage; continue; }
    if(page.type === 'back') { pages += backPage;  continue; }

    const refs = activeRefs(page.refs);
    if(!refs.length) continue; // omite la página si no hay productos activos

    const hdr = page.type === 'cat' ? `
  <div class="cat-hdr">
    <div class="cat-bar"></div>
    <div class="cat-name" style="font-size:20pt">${page.name}</div>
    <div class="cat-rule"></div>
    <div class="cat-slogan" style="font-size:10.5pt">${page.slogan}</div>
  </div>` : '';

    const prods = refs.map(r => buildProductHTML(r, prices, page.sz)).join('\n');
    pages += `<div class="page">
  <img class="page-logo" src="${logoSrc}" alt="CINNAMOON">${hdr}
  <div class="prods">
    <div class="grid" style="${page.grid}">
      ${prods}
    </div>
  </div>
</div>`;
  }

  return `<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>Catálogo CINNAMOON 2026</title>
<base href="${base}">
<style>${CATALOG_CSS}</style>
</head><body>
${pages}
<script>
window.onload = function(){ setTimeout(function(){ window.print(); }, 1200); };
<\/script>
</body></html>`;
}

function openCatalog(){
  const state = getFullState();
  const html  = buildCatalogHTML(state);
  const w = window.open('', '_blank');
  if(!w){ alert('Bloqueaste ventanas emergentes. Permitilas para este sitio.'); return; }
  w.document.write(html);
  w.document.close();
  setStatus('✓ Catálogo generado');
}
